<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Augment Vote</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@streamerbot/client@latest/dist/streamerbot-client.browser.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; width: 800px; height: 380px; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
  #container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; opacity: 0; transform: translateY(30px); transition: opacity 0.5s ease, transform 0.5s ease; }
  #container.visible { opacity: 1; transform: translateY(0); }
  #title { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 900; color: #c8a0e0; text-transform: uppercase; letter-spacing: 6px; text-shadow: 0 0 20px rgba(180,100,255,0.8), 0 0 40px rgba(180,100,255,0.4); }
  #vote-info { font-size: 16px; color: #c8a0e0; letter-spacing: 3px; font-weight: 500; }
  #cards-row { display: flex; gap: 28px; align-items: center; }
  .card-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .card { width: 130px; height: 190px; position: relative; display: flex; align-items: center; justify-content: center; transition: transform 0.3s ease, filter 0.3s ease, opacity 0.3s ease; }
  .card-frame { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; pointer-events: none; }
  .card-inner { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
  .card-num-label { font-family: 'Cinzel', serif; font-size: 52px; font-weight: 900; color: rgba(220,180,255,0.85); text-shadow: 0 0 20px rgba(180,100,255,0.8), 0 0 40px rgba(180,100,255,0.4); user-select: none; }
  .card.spinning .card-inner { animation: gentle-pulse 2s ease-in-out infinite; }
  @keyframes gentle-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .card.spinning .card-frame { animation: frame-pulse 2s ease-in-out infinite; }
  @keyframes frame-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  .card.winner { animation: winner-pulse 1.2s ease-in-out infinite; }
  .card.winner .card-num-label { color: #e0b0ff; text-shadow: 0 0 20px rgba(180,100,255,1), 0 0 40px rgba(180,100,255,0.6); }
  @keyframes winner-pulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(180,100,255,0.8)) drop-shadow(0 0 30px rgba(180,100,255,0.4)); } 50% { transform: scale(1.06); filter: drop-shadow(0 0 24px rgba(180,100,255,1)) drop-shadow(0 0 60px rgba(180,100,255,0.7)); } }
  .card.loser { opacity: 0.3; filter: grayscale(0.9); }
  .card-number { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 900; color: #c8a0e0; text-shadow: 0 0 10px rgba(180,100,255,0.6); letter-spacing: 2px; }
  .vote-count { font-size: 16px; font-weight: 700; color: #c8a0e0; letter-spacing: 2px; min-height: 22px; transition: color 0.3s ease; }
  .card-wrap.winner-wrap .card-number { color: #e0b0ff; text-shadow: 0 0 15px rgba(180,100,255,1); }
  .card-wrap.winner-wrap .vote-count { color: #e0b0ff; text-shadow: 0 0 10px rgba(180,100,255,0.6); }
  #timer-bar-wrap { width: 460px; height: 5px; background: rgba(180,120,255,0.15); border-radius: 3px; overflow: hidden; }
  #timer-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #6020a0, #c8a0e0); border-radius: 3px; transform-origin: left; transition: transform linear; }
  #result-text { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: #c8a0e0; letter-spacing: 4px; text-shadow: 0 0 20px rgba(180,100,255,0.8); min-height: 26px; text-align: center; }
</style>
</head>
<body>
<div id="container">
  <div id="title">⚔️ Augment Vote ⚔️</div>
  <div id="vote-info">TYPE 1, 2, OR 3 IN CHAT</div>
  <div id="cards-row">
    <div class="card-wrap" id="wrap-1">
      <div class="card spinning" id="card-1">
        <img class="card-frame" src="kingz.png" alt="">
        <div class="card-inner"><span class="card-num-label">1</span></div>
      </div>
      <div class="card-number">1</div>
      <div class="vote-count" id="votes-1">0 votes</div>
    </div>
    <div class="card-wrap" id="wrap-2">
      <div class="card spinning" id="card-2">
        <img class="card-frame" src="kingz.png" alt="">
        <div class="card-inner"><span class="card-num-label">2</span></div>
      </div>
      <div class="card-number">2</div>
      <div class="vote-count" id="votes-2">0 votes</div>
    </div>
    <div class="card-wrap" id="wrap-3">
      <div class="card spinning" id="card-3">
        <img class="card-frame" src="kingz.png" alt="">
        <div class="card-inner"><span class="card-num-label">3</span></div>
      </div>
      <div class="card-number">3</div>
      <div class="vote-count" id="votes-3">0 votes</div>
    </div>
  </div>
  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
  <div id="result-text"></div>
</div>
<script>
  const VOTE_DURATION = 30;
  let votes={1:0,2:0,3:0}, votedUsers={}, voteActive=false, timerInterval=null, timeLeft=VOTE_DURATION;
  const container=document.getElementById('container'), timerBar=document.getElementById('timer-bar'), resultText=document.getElementById('result-text'), voteInfo=document.getElementById('vote-info');

  function updateVoteCounts(){for(let i=1;i<=3;i++)document.getElementById(`votes-${i}`).textContent=`${votes[i]} vote${votes[i]!==1?'s':''}`;}

  function startVote(){
    votes={1:0,2:0,3:0}; votedUsers={}; voteActive=true; timeLeft=VOTE_DURATION; resultText.textContent=''; voteInfo.textContent='TYPE 1, 2, OR 3 IN CHAT';
    for(let i=1;i<=3;i++){document.getElementById(`card-${i}`).className='card spinning';document.getElementById(`wrap-${i}`).className='card-wrap';}
    updateVoteCounts(); container.classList.add('visible');
    timerBar.style.transition='none'; timerBar.style.transform='scaleX(1)';
    setTimeout(()=>{timerBar.style.transition=`transform ${VOTE_DURATION}s linear`;timerBar.style.transform='scaleX(0)';},100);
    timerInterval=setInterval(()=>{timeLeft--;if(timeLeft<=0){clearInterval(timerInterval);endVote();}},1000);
  }

  function endVote(){
    voteActive=false;
    let winner=1,maxVotes=votes[1];
    for(let i=2;i<=3;i++){if(votes[i]>maxVotes){maxVotes=votes[i];winner=i;}}
    const tied=Object.keys(votes).filter(k=>parseInt(votes[k])===maxVotes);
    if(tied.length>1)winner=parseInt(tied[Math.floor(Math.random()*tied.length)]);
    voteInfo.textContent='VOTING CLOSED';
    const order=[1,2,3].filter(n=>n!==winner); order.push(winner);
    order.forEach((cardNum,index)=>{
      setTimeout(()=>{
        const card=document.getElementById(`card-${cardNum}`),wrap=document.getElementById(`wrap-${cardNum}`);
        card.classList.remove('spinning');
        if(cardNum===winner){setTimeout(()=>{card.classList.add('winner');wrap.classList.add('winner-wrap');resultText.textContent=`⚔️ AUGMENT ${winner} CHOSEN BY CHAT ⚔️`;setTimeout(()=>{container.classList.remove('visible');},8000);},300);}
        else{card.classList.add('loser');}
      },index*700);
    });
  }

  function castVote(user,choice){
    if(!voteActive||votedUsers[user])return;
    const num=parseInt(choice);
    if(num>=1&&num<=3){votes[num]++;votedUsers[user]=true;updateVoteCounts();}
  }

  // Connect using StreamerbotClient
  const client = new StreamerbotClient({
    host: '127.0.0.1',
    port: 8080
  });

  client.on('Event.Custom', ({data}) => {
    console.log('Received event:', data);
    if(data.directive === 'StartVote') startVote();
    else if(data.directive === 'EndVote'){ clearInterval(timerInterval); endVote(); }
    else if(data.directive === 'CastVote' && data.user && data.choice) castVote(data.user, data.choice);
  });

  window.testStart=()=>startVote();
  window.testVote=(user,choice)=>castVote(user,choice);
  window.testEnd=()=>{clearInterval(timerInterval);endVote();};
</script>
</body>
</html>
